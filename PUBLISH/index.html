<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mzantsi Vibes</title>
  <meta name="description" content="A survival guide for South African youth navigating the years after matric that nobody prepares you for." />
  <meta property="og:title" content="Mzantsi Vibes 🇿🇦" />
  <meta property="og:description" content="A survival guide for South African youth navigating life after matric — whether you're studying, working, or still figuring it out." />
  <meta name="theme-color" content="#1a1a1a" />
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;1,9..144,400&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet" />
</head>
<body>

  <!-- HEADER -->
  <header class="site-header">
    <div class="header-inner">
      <div class="logo">
        <span class="logo-flag" data-content="site.flag"></span>
        <span class="logo-text" data-content="site.name"></span>
      </div>
      <nav class="header-links">
        <a id="header-github-link" target="_blank" rel="noopener"><span id="header-github-label"></span></a>
        <a id="header-contribute-link" class="btn-contribute"><span id="header-contribute-label"></span></a>
      </nav>
    </div>
  </header>

  <!-- HERO -->
  <section class="hero">
    <div class="hero-inner">
      <p class="hero-eyebrow" id="hero-eyebrow"></p>
      <h1 class="hero-title">
        <span id="hero-title-line1"></span><br />
        <em id="hero-title-emphasis"></em>
      </h1>
      <p class="hero-sub" id="hero-subtitle"></p>
    </div>
  </section>

  <!-- PATH SELECTOR -->
  <section class="path-section">
    <div class="container">
      <p class="path-label" id="path-label"></p>
      <div class="path-grid">
        <button class="path-card active" data-section="study" onclick="switchSection('study', this)">
          <span class="path-icon" id="path-icon-study"></span>
          <h2 id="path-heading-study"></h2>
          <p id="path-desc-study"></p>
        </button>
        <button class="path-card" data-section="work" onclick="switchSection('work', this)">
          <span class="path-icon" id="path-icon-work"></span>
          <h2 id="path-heading-work"></h2>
          <p id="path-desc-work"></p>
        </button>
        <button class="path-card" data-section="unsure" onclick="switchSection('unsure', this)">
          <span class="path-icon" id="path-icon-unsure"></span>
          <h2 id="path-heading-unsure"></h2>
          <p id="path-desc-unsure"></p>
        </button>
        <button class="path-card" data-section="everyone" onclick="switchSection('everyone', this)">
          <span class="path-icon" id="path-icon-everyone"></span>
          <h2 id="path-heading-everyone"></h2>
          <p id="path-desc-everyone"></p>
        </button>
      </div>
    </div>
  </section>

  <!-- CONTENT SECTIONS -->
  <main class="main-content container">

    <!-- LOADING STATE -->
    <div id="loading-state" class="loading-state">
      <div class="loading-spinner"></div>
      <p id="loading-message">Loading resources...</p>
    </div>

    <!-- ERROR STATE -->
    <div id="error-state" class="error-state hidden">
      <p>
        <span id="error-message"></span>
        <a id="error-link" target="_blank"></a>
      </p>
    </div>

    <!-- STUDY SECTION -->
    <div id="section-study" class="content-section hidden">
      <div id="study-content"></div>
    </div>

    <!-- WORK SECTION -->
    <div id="section-work" class="content-section hidden">
      <div id="work-content"></div>
    </div>

    <!-- UNSURE SECTION -->
    <div id="section-unsure" class="content-section hidden">
      <div class="callout-warm" id="unsure-callout"></div>

      <div class="assess-block">
        <h3 class="section-heading" id="unsure-assess-heading"></h3>
        <div id="unsure-questions"></div>
      </div>

      <h3 class="section-heading" id="unsure-options-heading"></h3>
      <div class="option-cards" id="unsure-options"></div>

      <div id="unsure-content"></div>
    </div>

    <!-- EVERYONE SECTION -->
    <div id="section-everyone" class="content-section hidden">
      <div id="everyone-content"></div>
    </div>

  </main>

  <!-- CONTRIBUTE BANNER -->
  <section class="contribute-banner">
    <div class="container">
      <div class="contribute-inner">
        <div class="contribute-text">
          <h3 id="contribute-heading"></h3>
          <p id="contribute-body"></p>
        </div>
        <a id="contribute-cta-link" class="contribute-cta"><span id="contribute-cta"></span></a>
      </div>
    </div>
  </section>

  <!-- FOOTER -->
  <footer class="site-footer">
    <div class="container footer-inner">
      <div class="footer-brand">
        <span data-content="site.flag"></span>
        <span data-content="site.name"></span>
      </div>
      <div class="footer-links">
        <a id="footer-github-link" target="_blank" rel="noopener">GitHub</a>
        <a id="footer-instagram-link" target="_blank" rel="noopener">Instagram</a>
        <a id="footer-linkedin-link" target="_blank" rel="noopener">LinkedIn</a>
      </div>
      <p class="footer-note" id="footer-tagline"></p>
    </div>
  </footer>

  <script src="script.js"></script>
</body>
</html>
